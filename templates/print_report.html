<!doctype html>
<html><head><meta charset="utf-8"><title>{{ title }} Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{font-family:'Inter',sans-serif;padding:40px;} h2{font-weight:800;} @media print {.no-print{display:none}}</style>
</head><body>
<div class="d-flex justify-content-between mb-3">
  <h2>{{title}} Report</h2>
  <div class="text-muted">{{ now.strftime('%B %d, %Y') }}</div>
</div>
<table class="table table-bordered">
  <thead class="table-light"><tr>{% for h in headers %}<th>{{h}}</th>{% endfor %}</tr></thead>
  <tbody>
    {% for row in rows %}<tr>{% for c in row %}<td>{{c}}</td>{% endfor %}</tr>{% endfor %}
  </tbody>
</table>
<div class="text-center mt-4 no-print"><button class="btn btn-primary" onclick="window.print()">Print / Save as PDF</button></div>
</body></html>
