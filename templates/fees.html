{% extends "_shell.html" %}
{% block content %}
<h1 class="page-title">Fees</h1>
<p class="page-sub">Track payments and issue printable receipts.</p>

<div class="row g-3">
  <div class="col-lg-4">
    <div class="card-soft p-3">
      <h5>Record Payment</h5>
      <form method="post" class="row g-2 mt-2">
        <div class="col-12">
          <label class="form-label">Student</label>
          <select name="student_id" class="form-select" required>
            {% for s in students %}<option value="{{s.id}}">{{s.name}} ({{s.roll_no}})</option>{% endfor %}
          </select>
        </div>
        <div class="col-6"><label class="form-label">Amount Due</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
        <div class="col-6"><label class="form-label">Paid Amount</label><input type="number" step="0.01" name="paid" class="form-control" required></div>
        <div class="col-12"><button class="btn btn-grad w-100">Save</button></div>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card-soft p-2">
      <table class="table-modern w-100">
        <thead><tr><th>Student</th><th>Amount</th><th>Paid</th><th>Status</th><th>Date</th><th></th></tr></thead>
        <tbody>
          {% for f in fees %}
          <tr>
            <td>#{{f.student_id}}</td>
            <td>₹{{f.amount}}</td><td>₹{{f.paid}}</td>
            <td><span class="badge-pill badge-{{f.status|lower}}">{{f.status}}</span></td>
            <td class="text-muted">{{f.date}}</td>
            <td><a href="{{ url_for('fee_receipt', fid=f.id) }}" target="_blank" class="btn btn-sm btn-outline-light-2"><i class="fa fa-print"></i></a></td>
          </tr>
          {% else %}<tr><td colspan="6" class="text-muted text-center py-3">No payments yet.</td></tr>{% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
