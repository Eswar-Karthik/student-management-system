{% extends "_shell.html" %}
{% block content %}
<h1 class="page-title">Courses</h1>
<p class="page-sub">All academic programs offered by the institution.</p>
<div class="row g-3">
  <div class="col-lg-4">
    <div class="card-soft p-3">
      <h5>Add Course</h5>
      <form method="post" class="row g-2 mt-2">
        <div class="col-12"><input name="name" class="form-control" placeholder="Course name" required></div>
        <div class="col-12"><input name="code" class="form-control" placeholder="Code (e.g. CS)" required></div>
        <div class="col-12"><input name="duration" class="form-control" placeholder="Duration (e.g. 4 Years)" required></div>
        <div class="col-12"><input name="department" class="form-control" placeholder="Department" required></div>
        <div class="col-12"><button class="btn btn-grad w-100">Add</button></div>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="row g-3">
      {% for c in courses %}
      <div class="col-md-6">
        <div class="card-soft p-3 d-flex justify-content-between align-items-start">
          <div>
            <div class="badge-pill badge-paid mb-2">{{c.code}}</div>
            <h6 class="fw-bold mb-1">{{c.name}}</h6>
            <div class="text-muted small">{{c.department}} · {{c.duration}}</div>
          </div>
          <form method="post" action="{{ url_for('delete_course', cid=c.id) }}" onsubmit="return confirmDelete(event)">
            <button class="btn btn-sm btn-outline-light-2 text-danger"><i class="fa fa-trash"></i></button>
          </form>
        </div>
      </div>
      {% else %}<div class="col-12 text-muted">No courses yet.</div>{% endfor %}
    </div>
  </div>
</div>
{% endblock %}
